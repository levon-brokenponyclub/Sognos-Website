<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flow</title>
        <style>
            :root {
                --hds-space-core-0: 0px;
                --hds-space-core-25: 2px;
                --hds-space-core-50: 4px;
                --hds-space-core-75: 6px;
                --hds-space-core-100: 8px;
                --hds-space-core-150: 12px;
                --hds-space-core-200: 16px;
                --hds-space-core-300: 24px;
                --hds-space-core-400: 32px;
                --hds-space-core-450: 36px;
                --hds-space-core-500: 40px;
                --hds-space-core-radius-sm: 4px;
                --hds-space-core-radius-md: 6px;
                --hds-space-core-radius-xs: 3px;
                --hds-font-weight-bold: 600;
                --hds-color-util-neutral-50: #101d51;
                --hds-color-util-neutral-975: #f2f7fe;
                --hds-color-util-brand-200: #dbe3ff;
                --hds-color-util-brand-300: #5d64fe;
                --hds-color-util-brand-600: #4338ca;
                --hds-color-action-bg-solid: #101d51;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: radial-gradient(
                    circle at 20% 20%,
                    #16235d 0%,
                    #0a143d 40%,
                    #060c27 100%
                );
                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
            }

            .stage {
                width: min(1200px, 96vw);
                border-radius: 14px;
                border: 1px solid rgba(120, 144, 255, 0.25);
                background: linear-gradient(180deg, #0b163f, #090f30);
                padding: 24px 20px;
                overflow: hidden;
            }

            .hds-button {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                background: #1b2a73;
                color: #f2f7fe;
                text-decoration: none;
            }

            .developer-systems-logo__svg {
                display: block;
                width: 100%;
                height: 100%;
            }

            .developer-systems-logo__placeholder {
                width: 100%;
                height: 100%;
                border-radius: 4px;
                background: linear-gradient(135deg, #263a90, #17255f);
            }

            .developer-systems-animation {
                position: relative;
                container-type: inline-size;
                container-name: developer-systems;
                overflow: hidden;
            }

            .developer-systems-animation__dot-grid {
                position: absolute;
                top: -60px;
                left: -8px;
                right: -8px;
                bottom: -80px;
                background-image: url("data:image/svg+xml;utf8,<svg width='10' height='10' xmlns='http://www.w3.org/2000/svg'><rect x='0' y='0' width='2' height='2' fill='%2330437F'/></svg>");
                background-size: 10px 10px;
                background-position: 0 0;
                opacity: 0.46;
                -webkit-mask-image: linear-gradient(
                    180deg,
                    hsla(0, 0%, 85%, 0),
                    #737373 50%,
                    hsla(0, 0%, 85%, 0)
                );
                mask-image: linear-gradient(
                    180deg,
                    hsla(0, 0%, 85%, 0),
                    #737373 50%,
                    hsla(0, 0%, 85%, 0)
                );
            }

            .developer-systems-animation__figure {
                position: relative;
                display: grid;
                grid-template-columns: 1fr;
                margin: auto;
                max-width: 1000px;
                height: 530px;
            }

            .developer-systems-animation__figure--chart-left {
                position: absolute;
                top: 52%;
                left: 0;
            }

            .developer-systems-animation__figure--chart-center {
                position: relative;
                display: grid;
                grid-template-rows: 88px 75px 266px 100px;
            }

            .developer-systems-animation__figure--chart-right {
                position: absolute;
                top: 68%;
                right: 6%;
            }

            .developer-systems-animation__stripe {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -40%);
            }

            .developer-systems-animation__stripe-center {
                position: relative;
                width: 80px;
                height: 80px;
                border-radius: var(--hds-space-core-radius-md);
                background: linear-gradient(
                    288.31deg,
                    #0d1738 -6.87%,
                    #4032c8 105.95%
                );
            }

            .developer-systems-animation__stripe-center svg {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .developer-systems-animation__apps {
                position: relative;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: var(--hds-space-core-50);
                padding: var(--hds-space-core-50);
                width: 112px;
                height: 76px;
                background: var(--hds-color-util-neutral-50);
                border-radius: var(--hds-space-core-radius-sm);
            }

            .developer-systems-animation__app {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 32px;
                width: 32px;
                border: 1px dashed var(--hds-color-util-brand-300);
                border-radius: var(--hds-space-core-radius-sm);
                transition: border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1;
                perspective: 250px;
            }

            .developer-systems-animation__app-logo {
                position: absolute;
                width: 32px;
                height: 32px;
                transition-duration: 2s;
                transition-timing-function: cubic-bezier(0.9, 0, 0.1, 1);
                transition-property: transform;
                transform-style: preserve-3d;
                z-index: 2;
                animation: logo-flip 12s linear infinite;
            }

            .developer-systems-animation__app-logo__back,
            .developer-systems-animation__app-logo__front {
                position: absolute;
                top: 0;
                backface-visibility: hidden;
            }

            .developer-systems-animation__app-logo__back {
                transform: rotateX(180deg);
            }

            .developer-systems-animation__systems {
                position: relative;
                display: flex;
                flex-direction: column;
                gap: var(--hds-space-core-100);
                padding: var(--hds-space-core-100);
                margin: 0 auto;
                width: 100%;
                height: fit-content;
            }

            .developer-systems-animation__systems-row-1 {
                display: grid;
                grid-template-columns: auto auto auto;
                gap: var(--hds-space-core-100);
            }

            .developer-systems-animation__systems-row-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--hds-space-core-100);
            }

            .developer-systems-animation__system-container {
                max-height: 32px;
                border: 1px dashed var(--hds-color-util-brand-300);
                transition: border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1;
            }

            .developer-systems-animation__system,
            .developer-systems-animation__system-container {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 32px;
                border-radius: var(--hds-space-core-radius-sm);
            }

            .developer-systems-animation__system {
                width: 100%;
                padding: 0 var(--hds-space-core-200);
                background: var(--hds-color-util-brand-200);
                font-size: 12px;
                font-weight: var(--hds-font-weight-bold);
                color: var(--hds-color-util-neutral-975);
                opacity: 0;
                scale: 0.75;
                transition-property: opacity, scale;
                transition-duration: 0.5s;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 2;
                box-shadow:
                    0 14.088px 21.132px -14.088px rgba(3, 3, 39, 0.25),
                    0 8.453px 16.906px -8.453px rgba(0, 0, 0, 0.1);
            }

            .developer-systems-animation__system-container--animate {
                border-color: transparent;
            }

            .developer-systems-animation__system-container--animate
                .developer-systems-animation__system {
                opacity: 1;
                scale: 1;
            }

            .developer-systems-animation__grid-row-layout--top {
                position: relative;
                display: flex;
                justify-content: center;
            }

            .developer-systems-animation__grid-row-layout--middle {
                position: absolute;
                top: 52%;
                right: 0;
            }

            .developer-systems-animation__grid-row-layout--bottom {
                display: flex;
                justify-content: center;
                align-items: flex-end;
            }

            .developer-systems-animation__grid-row-block--anchor {
                position: absolute;
                bottom: 0;
                display: inline-grid;
                grid-template-columns: repeat(2, 185px);
                z-index: 1;
            }

            .developer-systems-animation__grid-row-block {
                position: relative;
                display: flex;
                align-items: center;
                width: fit-content;
                height: 32px;
                padding: var(--hds-space-core-75) var(--hds-space-core-200);
                margin: auto auto 0;
                background: var(--hds-color-action-bg-solid);
                border-radius: var(--hds-space-core-radius-sm);
                font-size: 12px;
                font-weight: var(--hds-font-weight-bold);
                color: var(--hds-color-util-neutral-975);
            }

            .developer-systems-animation__grid-row-block--middle {
                margin: 0;
            }

            .developer-systems-animation__psp-container {
                position: relative;
                display: flex;
                gap: var(--hds-space-core-100);
                align-self: flex-end;
                margin: auto auto 0;
            }

            .developer-systems-animation__psp-container--single,
            :lang(ja-JP) .developer-systems-animation__psp-container--multiple,
            :lang(pt-BR) .developer-systems-animation__psp-container--multiple,
            :lang(th-TH) .developer-systems-animation__psp-container--multiple {
                display: none;
            }

            .developer-systems-animation__psp-app {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
                width: 40px;
                height: 40px;
                padding: var(--hds-space-core-75) var(--hds-space-core-200);
                background: var(--hds-color-util-brand-200);
                border-radius: var(--hds-space-core-radius-sm);
                font-size: 12px;
                font-weight: var(--hds-font-weight-bold);
                color: var(--hds-color-util-neutral-975);
                z-index: 2;
                opacity: 0;
                transform: scale(0.75);
                transition-property: opacity, transform;
                transition-duration: 0.5s;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                overflow: hidden;
            }

            .developer-systems-animation__psp-app-container {
                border: 1px dashed #152460;
                border-radius: var(--hds-space-core-radius-sm);
                transition: border-color 0.5s linear;
            }

            .developer-systems-animation__psp-app-container--animate {
                border-color: transparent;
            }

            .developer-systems-animation__psp-app-container--animate
                .developer-systems-animation__psp-app {
                opacity: 1;
                transform: scale(1);
            }

            .developer-systems-animation__button {
                display: none;
                padding: var(--hds-space-core-75) var(--hds-space-core-200);
            }

            .developer-systems-animation__dynamic-rect-bg {
                position: absolute;
                inset: 0;
                z-index: -1;
            }

            .developer-systems-animation__dynamic-rect-bg svg {
                width: 100%;
                height: 100%;
            }

            .developer-systems-animation__system-connections-svg {
                display: none;
            }

            .developer-systems-animation__system-connections-mobile-svg {
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                z-index: -1;
            }

            .developer-systems-animation__center-path-svg {
                display: none;
            }

            .developer-systems-animation__center-path-mobile-svg {
                display: block;
                position: absolute;
                top: 54%;
                width: 100%;
            }

            .developer-systems-animation__psp-connection-base-animated-stroke-svg {
                position: absolute;
                left: 50%;
                bottom: 0;
                transform: translateX(-50%);
            }

            .developer-systems-animation__psp-connection-path {
                stroke-dasharray: 120 120;
                stroke-dashoffset: 120;
            }

            .developer-systems-animation__psp-connection-path--active {
                animation: path-flow 3.6s cubic-bezier(0.25, 1, 0.5, 1) infinite;
            }

            .developer-systems-animation__psp-connection-path--active:nth-child(
                2
            ),
            .developer-systems-animation__psp-connection-path--active:nth-child(
                4
            ) {
                animation-delay: 0.5s;
            }

            .developer-systems-animation__psp-connection-path--active:nth-child(
                3
            ) {
                animation-delay: 1s;
            }

            @container developer-systems (min-width: 600px) {
                .developer-systems-animation__button.hds-button,
                .developer-systems-animation__grid-row-block,
                .developer-systems-animation__psp-app,
                .developer-systems-animation__system {
                    font-size: 14px;
                }

                .developer-systems-animation__figure {
                    width: fit-content;
                    height: 386px;
                    margin: 0 auto;
                    grid-template-columns: 1fr;
                }

                .developer-systems-animation__figure--chart-left {
                    top: 44%;
                }

                .developer-systems-animation__figure--chart-center {
                    max-width: 696px;
                    grid-template-rows: 48px 75px 160px auto;
                }

                .developer-systems-animation__figure--chart-right {
                    top: 68%;
                }

                .developer-systems-animation__stripe {
                    transform: translate(-50%, -75%);
                }

                .developer-systems-animation__apps {
                    width: 152px;
                    height: 105px;
                    gap: var(--hds-space-core-100);
                    padding: var(--hds-space-core-100);
                    border-radius: var(--hds-space-core-radius-md);
                }

                .developer-systems-animation__app,
                .developer-systems-animation__app-logo {
                    width: 40px;
                    height: 40px;
                }

                .developer-systems-animation__systems {
                    flex-direction: row;
                    height: 48px;
                }

                .developer-systems-animation__systems
                    .developer-systems-animation__dynamic-rect-bg {
                    z-index: 0;
                }

                .developer-systems-animation__grid-row-block--anchor {
                    grid-template-columns: repeat(2, 308px);
                }

                .developer-systems-animation__grid-row-layout--middle {
                    top: 47%;
                }

                .developer-systems-animation__system-connections-svg {
                    display: block;
                    position: absolute;
                    top: 0;
                    left: 50%;
                    transform: translateX(-50%);
                    z-index: -1;
                }

                .developer-systems-animation__system-connections-mobile-svg {
                    display: none;
                }

                .developer-systems-animation__center-path-mobile-svg {
                    top: 50%;
                }
            }

            @container developer-systems (min-width: 882px) {
                .developer-systems-animation__figure {
                    grid-template-columns: 152px auto 152px;
                }

                .developer-systems-animation__figure--chart-left {
                    position: relative;
                    display: flex;
                    align-items: center;
                    inset: unset;
                }

                .developer-systems-animation__figure--chart-center {
                    grid-template-rows: 48px 75px 136px 32px auto;
                }

                .developer-systems-animation__figure--chart-right {
                    position: relative;
                    display: flex;
                    align-items: center;
                    justify-content: flex-end;
                    inset: unset;
                }

                .developer-systems-animation__grid-row-layout--middle {
                    position: relative;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 0 var(--hds-space-core-450);
                    inset: unset;
                }

                .developer-systems-animation__button {
                    display: inline-flex;
                }

                .developer-systems-animation__button.hds-button {
                    height: var(--hds-space-core-400);
                }

                .developer-systems-animation__center-path-svg {
                    display: block;
                    position: absolute;
                    width: 100%;
                }

                .developer-systems-animation__center-path-mobile-svg {
                    display: none;
                }
            }

            @keyframes logo-flip {
                0% {
                    transform: rotateX(0deg);
                }
                100% {
                    transform: rotateX(360deg);
                }
            }

            @keyframes path-flow {
                0% {
                    stroke-dashoffset: 120;
                }
                45%,
                100% {
                    stroke-dashoffset: 0;
                }
            }

            .developer-systems-animation__app:nth-child(2n)
                .developer-systems-animation__app-logo {
                animation-delay: -2s;
            }

            .developer-systems-animation__app:nth-child(3n)
                .developer-systems-animation__app-logo {
                animation-delay: -4s;
            }
        </style>
    </head>
